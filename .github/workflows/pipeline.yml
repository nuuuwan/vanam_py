name: Vanam Pipeline

on:
  schedule:
    - cron: "0 6-18 * * *"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONPATH: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: "Step 1: Ingest photos and metadata"
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: python -m workflows.photo_ingest

      - name: "Step 2: Identify plants"
        env:
          PLANTNET_API_KEY: ${{ secrets.PLANTNET_API_KEY }}
        run: python -m workflows.identify

      - name: "Step 3: Clean up Vercel temporary storage"
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: python -m workflows.cleanup_temp_storage

      - name: "Step 4: Aggregate identifications"
        run: python -m workflows.aggregate

      - name: "Step 5: Clean up low-confidence old identifications"
        run: python -m workflows.cleanup_low_conf

      - name: "Step 6: Build data README"
        run: python -m workflows.data_readme_build

      - name: "Commit and push updated data"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update data [$(date -u +%Y-%m-%d)]"
          git push
